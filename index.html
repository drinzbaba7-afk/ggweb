<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albanian Empire RP | Portal Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e60000; --bg: #080808; --card: #121212; --text: #fff; --glass: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* UI Components */
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border: 1px solid #222; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--red); }
        
        h1, h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-align: center; }
        h1 span { color: var(--red); }

        input { width: 100%; padding: 14px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--red); background: #222; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-red:hover { background: #ff1a1a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230,0,0,0.3); }
        .btn-link { background: none; color: #888; font-size: 0.85rem; text-decoration: underline; }

        /* Dashboard Styles */
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .ticket-box { background: #181818; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #333; transition: 0.3s; }
        .ticket-box:hover { border-left-color: var(--red); background: #202020; }
        .status-pill { font-size: 0.65rem; padding: 4px 10px; border-radius: 50px; font-weight: bold; float: right; }
        .status-open { background: rgba(0,255,0,0.1); color: #00ff00; }
        .status-closed { background: rgba(255,255,255,0.05); color: #888; }
    </style>
</head>
<body>

<div class="container" style="margin-top: 50px;">
    <h1>ALBANIAN <span>EMPIRE</span></h1>

    <div id="auth-section" class="card" style="max-width: 450px; margin: auto;">
        <div id="login-form">
            <h2>Login</h2>
            <input type="text" id="l-user" placeholder="Username / Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn btn-red" onclick="handleLogin()">Hyr</button>
            <button class="btn btn-link" onclick="toggleAuth()">Nuk ke llogari? Regjistrohu</button>
        </div>

        <div id="register-form" class="hidden">
            <h2>Regjistrohu</h2>
            <input type="text" id="r-email" placeholder="Email Adresa">
            <input type="text" id="r-user" placeholder="Username IC">
            <input type="password" id="r-pass" placeholder="Password">
            <button class="btn btn-red" onclick="handleRegister()">Krijo Llogarinë</button>
            <button class="btn btn-link" onclick="toggleAuth()">Ke llogari? Hyr këtu</button>
        </div>
    </div>

    <div id="player-panel" class="hidden card">
        <div class="nav">
            <div>Mirësevjen, <b id="display-name" style="color:var(--red)"></b></div>
            <button onclick="logout()" class="btn btn-link" style="width:auto; text-decoration:none; color:red;">[ Dil ]</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div>
                <h3>Hap Tiketë të re 🎫</h3>
                <input type="text" id="t-sub" placeholder="Subjekti (p.sh. Problemi me gradën)">
                <textarea id="t-msg" style="width:100%; height:100px; background:#1a1a1a; border:1px solid #333; color:white; padding:10px; border-radius:8px; margin:10px 0;" placeholder="Shpjegoni arsyen..."></textarea>
                <button class="btn btn-red" onclick="sendTicket()">Dërgo te Staffi</button>
            </div>
            <div>
                <h3>Tiketat e mia</h3>
                <div id="my-tickets-list"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden card">
        <div class="nav">
            <h2 style="margin:0; color:var(--red)">STAFF CONTROL 🛡️</h2>
            <button onclick="logout()" class="btn btn-link" style="width:auto; color:red;">LOGOUT</button>
        </div>
        <div id="admin-master-list"></div>
    </div>
</div>

<script>
    // Hidden Webhook
    const _wh = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5MDgzNzA4ODQ0OTMzNTE2L3V2OEE3Y3FwNWRjQXFzX3l1cjJVeVR2WDFrdU9UQnA2dVNxbVVnLXNoT25Kb1lXQVFfNENnWEY2c3dsUW9ON215Nk9U";
    
    // Data Management
    let users = JSON.parse(localStorage.getItem('ae_users')) || [];
    let tickets = JSON.parse(localStorage.getItem('ae_tickets')) || [];
    let session = null;

    function toggleAuth() {
        document.getElementById('login-form').classList.toggle('hidden');
        document.getElementById('register-form').classList.toggle('hidden');
    }

    function handleRegister() {
        const email = document.getElementById('r-email').value;
        const user = document.getElementById('r-user').value;
        const pass = document.getElementById('r-pass').value;

        if(!email || !user || !pass) return alert("Plotëso të gjitha fushat!");
        if(users.find(u => u.username === user)) return alert("Ky username ekziston!");

        users.push({ email, username: user, password: pass });
        localStorage.setItem('ae_users', JSON.stringify(users));
        alert("Llogaria u krijua! Tani mund të hyni.");
        toggleAuth();
    }

    function handleLogin() {
        const userIn = document.getElementById('l-user').value;
        const passIn = document.getElementById('l-pass').value;

        // Admin Override
        if(userIn === 'albadmin' && passIn === 'albadminpanel') {
            session = { username: "ADMIN", role: "admin" };
            loadAdmin();
            return;
        }

        const found = users.find(u => (u.username === userIn || u.email === userIn) && u.password === passIn);
        if(found) {
            session = { username: found.username, role: "user" };
            loadUser();
        } else {
            alert("Kredencialet e gabuara!");
        }
    }

    function loadUser() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('player-panel').classList.remove('hidden');
        document.getElementById('display-name').innerText = session.username;
        renderUserTickets();
    }

    function loadAdmin() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        renderAdminTickets();
    }

    function logout() { location.reload(); }

    async function sendTicket() {
        const sub = document.getElementById('t-sub').value;
        const msg = document.getElementById('t-msg').value;
        if(!sub || !msg) return alert("Shkruaj subjektin dhe mesazhin!");

        const newT = {
            id: Date.now(),
            owner: session.username,
            subject: sub,
            message: msg,
            status: "E Hapur",
            reply: null
        };

        tickets.push(newT);
        localStorage.setItem('ae_tickets', JSON.stringify(tickets));
        
        // Discord Webhook
        await fetch(atob(_wh), {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🎫 TIKETË E RE NGA " + session.username,
                    color: 15105536,
                    fields: [
                        {name: "Subjekti", value: sub},
                        {name: "Mesazhi", value: msg}
                    ]
                }]
            })
        });

        renderUserTickets();
        document.getElementById('t-sub').value = "";
        document.getElementById('t-msg').value = "";
    }

    function renderUserTickets() {
        const div = document.getElementById('my-tickets-list');
        div.innerHTML = "";
        tickets.filter(t => t.owner === session.username).forEach(t => {
            div.innerHTML += `
                <div class="ticket-box">
                    <span class="status-pill ${t.status === 'E Hapur' ? 'status-open' : 'status-closed'}">${t.status}</span>
                    <b>${t.subject}</b>
                    <p style="font-size:0.8rem; color:#aaa; margin-top:5px;">${t.message}</p>
                    ${t.reply ? `<div style="color:var(--red); font-size:0.8rem; margin-top:10px;"><b>Staff:</b> ${t.reply}</div>` : ""}
                </div>
            `;
        });
    }

    function renderAdminTickets() {
        const div = document.getElementById('admin-master-list');
        div.innerHTML = "";
        tickets.forEach(t => {
            div.innerHTML += `
                <div class="ticket-box">
                    <p><b>Lojtari:</b> ${t.owner} | <b>Subjekti:</b> ${t.subject}</p>
                    <p style="font-size:0.9rem; margin:10px 0;">${t.message}</p>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="ans-${t.id}" placeholder="Përgjigja..." value="${t.reply || ''}" style="margin:0; padding:8px;">
                        <button class="btn btn-red" style="margin:0; width:auto; padding:5px 20px;" onclick="adminReply(${t.id})">Kthe Përgjigje</button>
                        <button onclick="deleteTicket(${t.id})" style="background:none; border:none; color:#555; cursor:pointer;">Fshij</button>
                    </div>
                </div>
            `;
        });
    }

    function adminReply(id) {
        const replyText = document.getElementById('ans-' + id).value;
        const idx = tickets.findIndex(t => t.id === id);
        tickets[idx].reply = replyText;
        tickets[idx].status = "E Mbyllur";
        localStorage.setItem('ae_tickets', JSON.stringify(tickets));
        renderAdminTickets();
    }

    function deleteTicket(id) {
        tickets = tickets.filter(t => t.id !== id);
        localStorage.setItem('ae_tickets', JSON.stringify(tickets));
        renderAdminTickets();
    }
</script>

</body>
</html>
