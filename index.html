<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albanian Empire RP | Ultra Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --red-glow: rgba(255, 0, 0, 0.4); --bg: #030303; --card: #0a0a0a; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }
        .container { max-width: 1100px; margin: auto; padding: 0 20px; }
        
        /* UI Kit */
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; }
        .animate { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons & Inputs */
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; font-size: 0.75rem; }
        .btn-main { background: var(--red); color: white; box-shadow: 0 5px 15px var(--red-glow); }
        .btn-delete { background: #331111; color: #ff4444; border: 1px solid #442222; }
        .btn-delete:hover { background: #ff4444; color: white; }
        
        input, textarea { width: 100%; padding: 15px; background: #0d0d0d; border: 1px solid #1a1a1a; color: white; border-radius: 12px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--red); }

        /* Cards & Grid */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .info-card { background: var(--card); padding: 30px 20px; border-radius: 20px; border: 1px solid #161616; transition: 0.3s; text-align: center; cursor: pointer; }
        .info-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .info-card i { font-size: 2rem; color: var(--red); margin-bottom: 10px; display: block; }

        /* Admin Specific */
        .admin-ticket-card { background: #080808; border: 1px solid #1a1a1a; padding: 20px; border-radius: 18px; margin-bottom: 15px; }
        .chat-display { background: #000; height: 200px; overflow-y: auto; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #111; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 10px; font-size: 0.8rem; width: fit-content; max-width: 85%; }
        .msg-player { background: #1a1a1a; align-self: flex-start; }
        .msg-staff { background: var(--red); color: white; margin-left: auto; }
    </style>
</head>
<body>

<div id="landing-page" class="container" style="padding-top: 10vh;">
    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-size: 3.5rem; font-weight: 800; letter-spacing: -2px;">EMPIRE <span style="color:var(--red)">PORTAL</span></h1>
    </div>
    <div class="glass" style="max-width: 400px; margin: auto;">
        <div id="login-form">
            <h2 style="text-align: center; margin-bottom: 25px;">LOGIN</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn btn-main" style="width: 100%;" onclick="handleLogin()">HYR</button>
            <p onclick="toggleAuth()" style="text-align:center; color:#444; margin-top:15px; cursor:pointer; font-size:0.75rem;">Regjistrohu si lojtar</p>
        </div>
        <div id="reg-form" class="hidden">
            <h2 style="text-align: center; margin-bottom: 25px;">SIGN UP</h2>
            <input type="text" id="r-user" placeholder="Username">
            <input type="password" id="r-pass" placeholder="Password">
            <button class="btn btn-main" style="width: 100%;" onclick="handleRegister()">KRIJO LLOGARINË</button>
            <p onclick="toggleAuth()" style="text-align:center; color:#444; margin-top:15px; cursor:pointer; font-size:0.75rem;">Kthehu te Login</p>
        </div>
    </div>
</div>

<div id="main-hub" class="hidden container animate" style="padding-top: 60px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 id="welcome-user" style="text-transform: uppercase;"></h2>
        <button class="btn" style="background: #111; color: var(--red);" onclick="location.reload()">LOGOUT</button>
    </div>
    <div class="info-grid">
        <div class="info-card" onclick="openSection('about-sec')"><i>⚖️</i><h3>RREGULLAT</h3></div>
        <div class="info-card" onclick="openSection('ticket-sec')"><i>🎫</i><h3>SUPPORT</h3></div>
        <div class="info-card" onclick="openSection('suggest-sec')"><i>💡</i><h3>SUGJERIME</h3></div>
    </div>
</div>

<div id="staff-panel" class="hidden container animate" style="padding-top: 60px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2>ADMIN <span style="color:var(--red)">DASHBOARD</span> 🛡️</h2>
        <button class="btn" style="background: #111; color: white;" onclick="location.reload()">LOGOUT</button>
    </div>
    <div class="glass">
        <h3 style="margin-bottom: 20px;">Menaxhimi i Tiketave</h3>
        <div id="admin-ticket-list">
            </div>
    </div>
</div>

<div id="content-area" class="container hidden animate" style="padding: 50px 20px;">
    <section id="ticket-sec" class="hidden glass">
        <button class="btn" style="background:#111; color:white; margin-bottom:20px;" onclick="closeSection()">MBRAPA</button>
        <div id="t-create-view">
            <h2>HAP TIKETË 🎫</h2>
            <input type="text" id="t-sub" placeholder="Subjekti...">
            <textarea id="t-msg" rows="3" placeholder="Mesazhi..."></textarea>
            <button class="btn btn-main" onclick="openTicket()">DËRGO</button>
        </div>
        <div id="active-ticket-view" class="hidden">
            <div class="chat-display" id="chat-display-player" style="display:flex; flex-direction:column;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="reply-player" style="margin:0;">
                <button class="btn btn-main" id="btn-p-reply" onclick="playerReply()">DËRGO</button>
            </div>
        </div>
    </section>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('ae_u')) || [];
    let tickets = JSON.parse(localStorage.getItem('ae_t')) || [];
    let session = null;

    function toggleAuth() { document.getElementById('login-form').classList.toggle('hidden'); document.getElementById('reg-form').classList.toggle('hidden'); }

    function handleLogin() {
        const u = document.getElementById('l-user').value.trim();
        const p = document.getElementById('l-pass').value.trim();
        
        if(u === "albadmin" && p === "albadminpanel") {
            session = {u: "Admin", role: "ADMIN"};
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('staff-panel').classList.remove('hidden');
            renderAdminTickets();
            return;
        }

        const f = users.find(x => x.u === u && x.p === p);
        if(f) {
            session = f;
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('main-hub').classList.remove('hidden');
            document.getElementById('welcome-user').innerText = f.u;
        } else alert("Gabim!");
    }

    function handleRegister() {
        const u = document.getElementById('r-user').value.trim();
        const p = document.getElementById('r-pass').value.trim();
        if(u && p) { users.push({u, p}); localStorage.setItem('ae_u', JSON.stringify(users)); toggleAuth(); }
    }

    function openSection(id) {
        document.getElementById('main-hub').classList.add('hidden');
        document.getElementById('content-area').classList.remove('hidden');
        document.getElementById('ticket-sec').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        if(id === 'ticket-sec') checkTicket();
    }

    function closeSection() { document.getElementById('content-area').classList.add('hidden'); document.getElementById('main-hub').classList.remove('hidden'); }

    // TICKET LOGIC (PLAYER)
    function checkTicket() {
        const t = tickets.find(x => x.owner === session.u);
        if(t) {
            document.getElementById('t-create-view').classList.add('hidden');
            document.getElementById('active-ticket-view').classList.remove('hidden');
            renderPlayerChat(t);
        }
    }

    function openTicket() {
        const sub = document.getElementById('t-sub').value;
        const msg = document.getElementById('t-msg').value;
        if(sub && msg) {
            tickets.push({id: Date.now(), owner: session.u, sub, chat: [{u: session.u, m: msg}]});
            localStorage.setItem('ae_t', JSON.stringify(tickets));
            checkTicket();
        }
    }

    function playerReply() {
        const m = document.getElementById('reply-player').value;
        if(!m) return;
        const idx = tickets.findIndex(x => x.owner === session.u);
        tickets[idx].chat.push({u: session.u, m: m});
        localStorage.setItem('ae_t', JSON.stringify(tickets));
        document.getElementById('reply-player').value = "";
        renderPlayerChat(tickets[idx]);
        
        const btn = document.getElementById('btn-p-reply');
        btn.disabled = true; setTimeout(() => btn.disabled = false, 5000);
    }

    function renderPlayerChat(t) {
        const d = document.getElementById('chat-display-player');
        d.innerHTML = t.chat.map(c => `<div class="msg ${c.u === session.u ? 'msg-player' : 'msg-staff'}"><b>${c.u}:</b> ${c.m}</div>`).join('');
        d.scrollTop = d.scrollHeight;
    }

    // ADMIN LOGIC
    function renderAdminTickets() {
        const list = document.getElementById('admin-ticket-list');
        if(tickets.length === 0) { list.innerHTML = "<p style='color:#444'>Nuk ka tiketa.</p>"; return; }
        
        list.innerHTML = tickets.map((t, index) => `
            <div class="admin-ticket-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h4>${t.sub} <span style="color:#666; font-size:0.7rem;">(Nga: ${t.owner})</span></h4>
                    <button class="btn btn-delete" onclick="deleteTicket(${index})">MSHELE / FSHIJ</button>
                </div>
                <div class="chat-display" id="admin-chat-${index}" style="display:flex; flex-direction:column;">
                    ${t.chat.map(c => `<div class="msg ${c.u === "Admin" ? 'msg-staff' : 'msg-player'}"><b>${c.u}:</b> ${c.m}</div>`).join('')}
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="admin-input-${index}" style="margin:0;" placeholder="Përgjigju lojtarit...">
                    <button class="btn btn-main" onclick="adminReply(${index})">DËRGO</button>
                </div>
            </div>
        `).join('');
    }

    function adminReply(index) {
        const m = document.getElementById(`admin-input-${index}`).value;
        if(!m) return;
        tickets[index].chat.push({u: "Admin", m: m});
        localStorage.setItem('ae_t', JSON.stringify(tickets));
        renderAdminTickets();
    }

    function deleteTicket(index) {
        if(confirm("A jeni i sigurt që doni të fshini këtë tiketë?")) {
            tickets.splice(index, 1);
            localStorage.setItem('ae_t', JSON.stringify(tickets));
            renderAdminTickets();
        }
    }
</script>
</body>
</html>
