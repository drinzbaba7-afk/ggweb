<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albanian Empire RP - Portal</title>
    <style>
        :root { --red: #e60000; --dark: #0a0a0a; --card: #151515; --text: #ffffff; --gold: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .hidden { display: none; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border-top: 5px solid var(--red); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--red); text-align: center; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px #000; }
        h2 { color: var(--gold); text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 14px; background: var(--red); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #ff1a1a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230, 0, 0, 0.4); }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 10px 20px; border-radius: 8px; border-bottom: 1px solid #333; }
        .logout { background: #333; width: auto; padding: 8px 20px; font-size: 13px; }
        .ticket-item { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--red); animation: fadeIn 0.5s ease; }
        .status-open { color: #00ff00; background: rgba(0,255,0,0.1); padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-closed { color: #aaa; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .reply-box { margin-top: 15px; padding: 15px; background: #252525; border-radius: 6px; border: 1px dashed #444; color: #ddd; border-left: 3px solid var(--gold); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🇦🇱 Albanian Empire RP 🇦🇱</h1>

    <div id="login-section" class="card">
        <h2>Sistemi i Menaxhimit</h2>
        <p style="text-align:center; color: #888;">Shkruani Username tuaj IC ose Kodin e Adminit</p>
        <input type="text" id="login-username" placeholder="Emri i lojtarit ose Admin Code...">
        <button onclick="login()">HYR NË DASHBOARD</button>
    </div>

    <div id="player-dashboard" class="hidden">
        <div class="nav">
            <span id="welcome-msg" style="color: var(--gold); font-weight: bold;"></span>
            <button class="logout" onclick="logout()">LOGOUT</button>
        </div>
        
        <div class="card">
            <h3>Hap një Tiketë të Re 🎫</h3>
            <input type="text" id="ticket-subject" placeholder="Subjekti (p.sh. Problem me mjetin / Gradat)">
            <textarea id="ticket-msg" rows="4" placeholder="Shpjegoni problemin tuaj..."></textarea>
            <button onclick="createTicket()">DËRGO TIKETËN</button>
        </div>

        <h3 style="border-bottom: 2px solid var(--red); display: inline-block;">Tiketat e mia</h3>
        <div id="my-tickets"></div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="nav">
            <span style="color: var(--red); font-weight: bold;">STAFF CONTROL PANEL 🛡️</span>
            <button class="logout" onclick="logout()">LOGOUT</button>
        </div>
        
        <h2>Tiketat e Lojtarëve</h2>
        <div id="admin-tickets-list"></div>
    </div>
</div>

<script>
    let currentUser = null;
    let isAdmin = false;

    // WEBHOOK HIDDEN IN BASE64
    const _0x4f22 = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5MDgzNzA4ODQ0OTMzNTE2L3V2OEE3Y3FwNWRjQXFzX3l1cjJVeVR2WDFrdU9UQnA2dVNxbVVnLXNoT25Kb1lXQVFfNENnWEY2c3dsUW9ON215Nk9U";
    const getW = () => atob(_0x4f22);

    let tickets = JSON.parse(localStorage.getItem('ae_tickets')) || [];

    function login() {
        const input = document.getElementById('login-username').value.trim();
        if (!input) return alert("Ju lutem shkruani një emër!");

        if (input === 'albempireadminpanel') {
            isAdmin = true;
            currentUser = "Admin Staff";
            document.getElementById('login-section').classList.add('hidden');
            showAdminPanel();
        } else {
            isAdmin = false;
            currentUser = input;
            document.getElementById('login-section').classList.add('hidden');
            showPlayerDashboard();
        }
    }

    function logout() { location.reload(); }

    function showPlayerDashboard() {
        document.getElementById('player-dashboard').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Lojtari: " + currentUser;
        renderPlayerTickets();
    }

    function showAdminPanel() {
        document.getElementById('admin-panel').classList.remove('hidden');
        renderAdminTickets();
    }

    async function createTicket() {
        const subject = document.getElementById('ticket-subject').value;
        const msg = document.getElementById('ticket-msg').value;

        if (!subject || !msg) return alert("Plotëso të gjitha fushat!");

        const newTicket = {
            id: Date.now(),
            user: currentUser,
            subject: subject,
            message: msg,
            status: 'E Hapur',
            reply: null,
            date: new Date().toLocaleString('sq-AL')
        };

        tickets.push(newTicket);
        saveTickets();
        
        // SEND TO DISCORD
        await sendToDiscord(newTicket);

        renderPlayerTickets();
        document.getElementById('ticket-subject').value = "";
        document.getElementById('ticket-msg').value = "";
        alert("Tiketa u dërgua! Stafi është njoftuar në Discord.");
    }

    async function sendToDiscord(ticket) {
        const payload = {
            username: "Albanian Empire Bot",
            embeds: [{
                title: "🎫 TIKETË E RE",
                color: 15105536,
                fields: [
                    { name: "👤 Lojtari", value: ticket.user, inline: true },
                    { name: "📅 Data", value: ticket.date, inline: true },
                    { name: "📌 Subjekti", value: ticket.subject },
                    { name: "📝 Mesazhi", value: ticket.message }
                ],
                footer: { text: "Menaxhimi i Serverit Albanian Empire" }
            }]
        };

        try {
            await fetch(getW(), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (e) { console.error("Discord error", e); }
    }

    function renderPlayerTickets() {
        const container = document.getElementById('my-tickets');
        container.innerHTML = "";
        const myTickets = tickets.filter(t => t.user === currentUser);

        if(myTickets.length === 0) container.innerHTML = "<p style='color:#555; text-align:center;'>Nuk keni asnjë tiketë aktuale.</p>";

        myTickets.forEach(t => {
            container.innerHTML += `
                <div class="ticket-item">
                    <div style="display:flex; justify-content:space-between">
                        <strong>${t.subject}</strong> 
                        <span class="${t.status === 'E Hapur' ? 'status-open' : 'status-closed'}">${t.status}</span>
                    </div>
                    <p style="font-size: 14px; color: #bbb;">${t.message}</p>
                    ${t.reply ? `<div class="reply-box"><strong>Përgjigja nga Admini:</strong><br>${t.reply}</div>` : ""}
                </div>
            `;
        });
    }

    function renderAdminTickets() {
        const container = document.getElementById('admin-tickets-list');
        container.innerHTML = "";

        tickets.forEach(t => {
            container.innerHTML += `
                <div class="card" style="border-left: 5px solid ${t.status === 'E Mbyllur' ? '#444' : '#e60000'}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span style="color:var(--gold)">Lojtari: ${t.user}</span>
                        <span style="font-size:11px; color:#888;">${t.date}</span>
                    </div>
                    <h4>${t.subject}</h4>
                    <p style="background:#222; padding:10px; border-radius:4px; font-size:14px;">${t.message}</p>
                    <textarea id="reply-${t.id}" placeholder="Shkruaj përgjigjen këtu...">${t.reply || ""}</textarea>
                    <div style="display:flex; gap:10px;">
                        <button style="background: #28a745; flex:2;" onclick="adminReply(${t.id})">KTHE PËRGJIGJE</button>
                        <button style="background: #444; flex:1;" onclick="deleteTicket(${t.id})">FSHIJ</button>
                    </div>
                </div>
            `;
        });
    }

    function adminReply(id) {
        const replyText = document.getElementById(`reply-${id}`).value;
        const index = tickets.findIndex(t => t.id === id);
        tickets[index].reply = replyText;
        tickets[index].status = "E Mbyllur";
        saveTickets();
        alert("Përgjigja u ruajt!");
        renderAdminTickets();
    }

    function deleteTicket(id) {
        if(confirm("Dëshiron ta fshish këtë tiketë?")) {
            tickets = tickets.filter(t => t.id !== id);
            saveTickets();
            renderAdminTickets();
        }
    }

    function saveTickets() { localStorage.setItem('ae_tickets', JSON.stringify(tickets)); }
</script>

</body>
</html>
